<div class="gameSpecific">
  @if (this.connectedGame == games.synthRiders) {
    <app-synth-riders-modifiers [gameState]="gameState"></app-synth-riders-modifiers>
  }
  @if (this.connectedGame != games.synthRiders) {
    <app-generic-modifiers [gameState]="gameState"></app-generic-modifiers>
  }
</div>
